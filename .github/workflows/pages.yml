name: Публикация GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    name: Сборка dashboard
    runs-on: ubuntu-latest
    steps:
      - name: Получить код
        uses: actions/checkout@v4

      - name: Установить Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Установить зависимости
        run: npm ci

      - name: Собрать проект
        run: npm run build

      - name: Настроить GitHub Pages
        uses: actions/configure-pages@v6

      - name: Подготовить артефакт Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    name: Деплой на GitHub Pages
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Опубликовать Pages
        id: deployment
        uses: actions/deploy-pages@v4
